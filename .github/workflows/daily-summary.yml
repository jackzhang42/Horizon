name: Daily Horizon Summary
# Trigger note: edits to this workflow file intentionally retrigger verification runs.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/daily-summary.yml'
      - 'data/config.github.json'
  schedule:
    - cron: '0 2 * * *'   # Covers 03:00 Europe/London during BST
    - cron: '0 3 * * *'   # Covers 03:00 Europe/London during GMT
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Validate required secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::error::Missing repository secret DEEPSEEK_API_KEY"
            exit 1
          fi

      - name: Check London 3am schedule
        id: london_schedule_check
        if: github.event_name == 'schedule'
        run: |
          LONDON_HOUR=$(TZ=Europe/London date +'%H')
          if [ "$LONDON_HOUR" != "03" ]; then
            echo "Current Europe/London hour is $LONDON_HOUR, not 03. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Confirmed Europe/London 03:00 scheduled run."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Prepare GitHub Actions config
        if: github.event_name != 'schedule' || steps.london_schedule_check.outputs.should_run == 'true'
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        if: github.event_name != 'schedule' || steps.london_schedule_check.outputs.should_run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        if: github.event_name != 'schedule' || steps.london_schedule_check.outputs.should_run == 'true'
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        if: github.event_name != 'schedule' || steps.london_schedule_check.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
